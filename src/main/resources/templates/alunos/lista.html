<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Alunos</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container">
    <h1>Lista de Alunos</h1>

    <p th:if="${mensagem}" th:text="${mensagem}" class="mensagem-sucesso"></p>
    <p th:if="${erro}" th:text="${erro}" class="mensagem-erro"></p>

    <a th:href="@{/alunos/novo}" class="btn-novo">+ Novo Aluno</a>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Email</th>
            <th>Curso</th>
            <th>Ações</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="aluno : ${alunos}">
            <td th:text="${aluno.id}"></td>
            <td th:text="${aluno.nome}"></td>
            <td th:text="${aluno.email}"></td>
            <td th:text="${aluno.curso}"></td>
            <td>
                <a th:href="@{/alunos/editar/{id}(id=${aluno.id})}" class="btn-editar">Editar</a>
                <form th:action="@{/alunos/excluir/{id}(id=${aluno.id})}"
                      method="post" style="display:inline">
                    <button type="submit" class="btn-excluir">Excluir</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
