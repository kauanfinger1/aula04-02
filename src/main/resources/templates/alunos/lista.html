<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Lista de Alunos</title>
</head>
<body>
<h1>Lista de Alunos</h1>

<a th:href="@{/alunos/novo}">Novo Aluno</a>

<table border="1">
    <thead>
    <tr>
        <th>ID</th>
        <th>Nome</th>
        <th>Sala</th>
        <th>Turno</th>
        <th>Ações</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="aluno : ${alunos}">
        <td th:text="${aluno.id}">1</td>
        <td th:text="${aluno.nome}">Nome</td>
        <td th:text="${aluno.sala}">Sala</td>
        <td th:text="${aluno.turno}">Turno</td>
        <td>
            <a th:href="@{'/alunos/editar/' + ${aluno.id}}">Editar</a>
            <a th:href="@{'/alunos/excluir/' + ${aluno.id}}"
               onclick="return confirm('Deseja realmente excluir?');">Excluir</a>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
