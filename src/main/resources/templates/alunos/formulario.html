<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Formulário de Aluno</title>
</head>
<body>
<h1 th:text="${aluno.id == null} ? 'Novo Aluno' : 'Editar Aluno'">Formulário</h1>

<form th:action="@{/alunos/salvar}" th:object="${aluno}" method="post">
    <input type="hidden" th:field="*{id}" />

    <label for="nome">Nome:</label>
    <input type="text" id="nome" th:field="*{nome}" required />

    <label for="sala">Sala:</label>
    <input type="text" id="sala" th:field="*{sala}" required />

    <label for="turno">Turno:</label>
    <input type="text" id="turno" th:field="*{turno}" required />

    <button type="submit">Salvar</button>
</form>

<a th:href="@{/alunos}">Voltar</a>
</body>
</html>
